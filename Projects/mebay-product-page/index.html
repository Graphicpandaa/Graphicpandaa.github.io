<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>mebay product page</title>
        <link href="css/style.css" rel="stylesheet">
    </head>
    <body>
      <!--Flexbox Container-->
      <div id="layout">

        <!--Column 1: thumbnail Images-->
        <div id="thumbnail-column">
        <img src="images/thumbnail1.webp" alt="Thumbnail 1">
        <img src="images/thumbnail2.webp" alt="thumbnail 2">
        <img src="images/thumbnail3.webp" alt="thumbnail 3">
        </div>

        <!--Column 2: featured image-->
         <div id="featured-image-column">
        <img src="images/main product.webp" alt="main product">
         </div>

         <!--Column 3: product info-->
         <div id="product-info-column">
        <h1>Sportscards732</h1>
        <p>
            <a href="#">94.4% positive feedback</a>
            <a href="#">Seller's other items</a>
            <a href="#">Contact seller</a>
        </p>
        <p class="price">$169.99</p>
        <p class="condition">Condition: New</p>
        <button class="buy-now">Buy It Now</button>
        <button>Add to Cart</button>
        <button>Add to Wishlist</button>

    </body>
</html>
